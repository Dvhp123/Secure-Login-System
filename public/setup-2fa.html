<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAuth — Enable 2FA</title>
  <meta name="description" content="Set up Two-Factor Authentication for your account." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-radial"></div>
  <div class="particles" id="particles"></div>

  <div class="page-wrapper">
    <div class="auth-card" style="max-width: 480px;">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">📱</div>
        <h1>Enable 2FA</h1>
        <p>Scan QR with Google Authenticator or Authy</p>
      </div>

      <!-- Steps -->
      <div class="steps">
        <div class="step active" id="step1">
          <div class="step-num">1</div>
          <span>Scan QR</span>
        </div>
        <div class="step" id="step2">
          <div class="step-num">2</div>
          <span>Verify OTP</span>
        </div>
        <div class="step" id="step3">
          <div class="step-num">3</div>
          <span>Done!</span>
        </div>
      </div>

      <!-- Alert -->
      <div class="alert" id="alertBox" role="alert">
        <span id="alertIcon">ℹ️</span>
        <span id="alertMsg"></span>
      </div>

      <!-- Step 1: QR Code -->
      <div id="qrSection">
        <div class="qr-container" id="qrContainer">
          <div style="text-align:center; color:var(--text-secondary); padding:2rem;">
            <div class="loading-spinner" style="display:inline-block; margin:auto;"></div>
            <p style="margin-top:1rem; font-size:0.88rem;">Generating your QR code...</p>
          </div>
        </div>

        <div style="margin-top:1rem;">
          <p style="font-size:0.82rem; color:var(--text-secondary); text-align:center; margin-bottom:0.5rem;">
            Manual entry key:
          </p>
          <div class="secret-key" id="secretKey">Loading...</div>
        </div>

        <div style="margin-top:1.2rem; padding:0.9rem; background:var(--cyan-dim); border:1px solid rgba(0,200,255,0.2); border-radius:var(--radius-md);">
          <p style="font-size:0.82rem; color:var(--text-secondary); line-height:1.6;">
            📱 Open <strong style="color:var(--text-primary);">Google Authenticator</strong> or <strong style="color:var(--text-primary);">Authy</strong> →
            tap <strong style="color:var(--text-primary);">+</strong> → scan the QR code above.
          </p>
        </div>

        <button class="btn btn-primary" id="nextBtn" style="margin-top:1.2rem;">
          Next — Enter OTP →
        </button>
      </div>

      <!-- Step 2: OTP Verification -->
      <div id="otpSection" style="display:none;">
        <p style="text-align:center; color:var(--text-secondary); font-size:0.88rem; margin-bottom:1.5rem;">
          Enter the 6-digit code from your authenticator app:
        </p>

        <div class="otp-inputs" id="otpInputs">
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 1" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 2" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 3" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 4" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 5" />
          <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 6" />
        </div>

        <button class="btn btn-primary" id="verifyBtn" style="margin-top:1.5rem;" disabled>
          <div class="spinner" id="verifySpinner"></div>
          <span id="verifyBtnText">✅ Verify & Enable 2FA</span>
        </button>

        <button class="btn btn-secondary" id="backBtn" style="margin-top:0.75rem;">
          ← Back to QR Code
        </button>
      </div>

      <div class="auth-link">
        <a href="/dashboard">← Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script src="/js/particles.js"></script>
  <script src="/js/setup2fa.js"></script>
</body>
</html>
